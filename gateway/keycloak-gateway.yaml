apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: keycloak-ingress
  namespace: agentgateway-system
  labels:
    app: agentgateway-kyverno
spec:
  gatewayClassName: agentgateway
  infrastructure:
    parametersRef:
      name: agentgateway-config
      group: agentgateway.dev
      kind: AgentgatewayParameters
  listeners:
    - protocol: HTTPS
      port: 8443
      name: https
      hostname: keycloak.kind.cluster
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: keycloak-tls
            namespace: keycloak
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-https
  namespace: agentgateway-system
  labels:
    app: agentgateway-kyverno
spec:
  parentRefs:
    - name: keycloak-ingress
      namespace: agentgateway-system
      sectionName: https
  rules:
    - matches:
        - path:
            type: Exact
            value: /.well-known/oauth-authorization-server/mcp
        - path:
            type: Exact
            value: /.well-known/oauth-authorization-server
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: http
              - name: X-Forwarded-Port
                value: "8080"
              - name: X-Forwarded-Host
                value: keycloak.kind.cluster:8080
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /realms/master/.well-known/oauth-authorization-server
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            remove:
              - strict-transport-security
      backendRefs:
        - name: keycloak
          namespace: keycloak
          group: ""
          kind: Service
          port: 8080
    - matches:
        - path:
            type: Exact
            value: /.well-known/openid-configuration/mcp
        - path:
            type: Exact
            value: /.well-known/openid-configuration
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: http
              - name: X-Forwarded-Port
                value: "8080"
              - name: X-Forwarded-Host
                value: keycloak.kind.cluster:8080
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /realms/master/.well-known/openid-configuration
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            remove:
              - strict-transport-security
      backendRefs:
        - name: keycloak
          namespace: keycloak
          group: ""
          kind: Service
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /resources
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: http
              - name: X-Forwarded-Port
                value: "8080"
              - name: X-Forwarded-Host
                value: keycloak.kind.cluster:8080
      backendRefs:
        - name: keycloak
          namespace: keycloak
          group: ""
          kind: Service
          port: 8080
    - matches:
        - path:
            type: PathPrefix
            value: /realms/master
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: http
              - name: X-Forwarded-Port
                value: "8080"
              - name: X-Forwarded-Host
                value: keycloak.kind.cluster:8080
      backendRefs:
        - name: keycloak
          namespace: keycloak
          group: ""
          kind: Service
          port: 8080
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: keycloak-cors
  namespace: agentgateway-system
spec:
  targetRefs:
    - name: keycloak-https
      kind: HTTPRoute
      group: gateway.networking.k8s.io
  traffic:
    cors:
      allowOrigins:
        - http://localhost:6274
      allowMethods:
        - GET
        - POST
        - OPTIONS
      allowHeaders:
        - mcp-protocol-version
        - content-type
        - authorization
        - origin
      allowCredentials: false