apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-public
  namespace: agentgateway-system
  labels:
    app: agentgateway-kyverno
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
  - matches:
      - path:
          type: Exact
          value: /.well-known/oauth-authorization-server/mcp
      - path:
          type: Exact
          value: /.well-known/oauth-authorization-server
    filters:
      - type: RequestHeaderModifier
        requestHeaderModifier:
          set:
            - name: X-Forwarded-Proto
              value: http
            - name: X-Forwarded-Port
              value: "18080"
            - name: X-Forwarded-Host
              value: keycloak.localhost:18080
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplaceFullPath
            replaceFullPath: /realms/master/.well-known/oauth-authorization-server
      - type: ResponseHeaderModifier
        responseHeaderModifier:
          remove:
            - strict-transport-security
    backendRefs:
      - name: keycloak-http
        namespace: keycloak
        group: ""
        kind: Service
        port: 8080
  - matches:
      - path:
          type: Exact
          value: /.well-known/openid-configuration/mcp
      - path:
          type: Exact
          value: /.well-known/openid-configuration
    filters:
      - type: RequestHeaderModifier
        requestHeaderModifier:
          set:
            - name: X-Forwarded-Proto
              value: http
            - name: X-Forwarded-Port
              value: "18080"
            - name: X-Forwarded-Host
              value: keycloak.localhost:18080
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplaceFullPath
            replaceFullPath: /realms/master/.well-known/openid-configuration
      - type: ResponseHeaderModifier
        responseHeaderModifier:
          remove:
            - strict-transport-security
    backendRefs:
      - name: keycloak-http
        namespace: keycloak
        group: ""
        kind: Service
        port: 8080
  - matches:
      - path:
          type: Exact
          value: /.well-known/oauth-protected-resource
      - path:
          type: Exact
          value: /.well-known/oauth-protected-resource/mcp
    backendRefs:
      - name: mcp
        group: agentgateway.dev
        kind: AgentgatewayBackend
  - matches:
      - path:
          type: PathPrefix
          value: /realms/master
      - path:
          type: PathPrefix
          value: /resources
    filters:
      - type: RequestHeaderModifier
        requestHeaderModifier:
          set:
            - name: X-Forwarded-Proto
              value: http
            - name: X-Forwarded-Port
              value: "18080"
            - name: X-Forwarded-Host
              value: keycloak.localhost:18080
      - type: ResponseHeaderModifier
        responseHeaderModifier:
          remove:
            - strict-transport-security
    backendRefs:
      - name: keycloak-http
        namespace: keycloak
        group: ""
        kind: Service
        port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp
  namespace: agentgateway-system
  labels:
    app: agentgateway-kyverno
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
  - matches:
      # Main MCP endpoint
      - path:
          type: PathPrefix
          value: /mcp
    backendRefs:
      - name: mcp
        group: agentgateway.dev
        kind: AgentgatewayBackend
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-preflight
  namespace: agentgateway-system
  labels:
    app: agentgateway-kyverno
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
  - matches:
      - method: OPTIONS
        path:
          type: PathPrefix
          value: /mcp
    backendRefs:
      - name: mcp
        group: agentgateway.dev
        kind: AgentgatewayBackend