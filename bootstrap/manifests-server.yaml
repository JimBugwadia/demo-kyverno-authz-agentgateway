apiVersion: v1
kind: Namespace
metadata:
  name: demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-manifests
  namespace: demo
data:
  nginx-deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-deployment
      labels:
        app: nginx
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: nginx
      template:
        metadata:
          labels:
            app: nginx
        spec:
          containers:
          - name: nginx
            image: nginx:1.14.2
            ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manifests-server
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manifests-server
  template:
    metadata:
      labels:
        app: manifests-server
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: manifests
          mountPath: /usr/share/nginx/html
      volumes:
      - name: manifests
        configMap:
          name: demo-manifests
---
apiVersion: v1
kind: Service
metadata:
  name: manifests
  namespace: demo
spec:
  selector:
    app: manifests-server
  ports:
  - port: 80
    targetPort: 80
