fullnameOverride: keycloak

command:
  - "/opt/keycloak/bin/kc.sh"
  - "start-dev"
  - "--http-port=8080"
  - "--http-relative-path=/"

extraEnv: |
  - name: KC_BOOTSTRAP_ADMIN_USERNAME
    value: admin
  - name: KC_BOOTSTRAP_ADMIN_PASSWORD
    value: admin

service:
  type: NodePort
  httpPort: 8080
  httpsPort: 8443
  httpNodePort: 30080

startupProbe: |
  httpGet:
    path: /health
    port: http-internal
  initialDelaySeconds: 15
  periodSeconds: 5
  failureThreshold: 60

readinessProbe: |
  httpGet:
    path: /health/ready
    port: http-internal
  initialDelaySeconds: 10
  periodSeconds: 10

livenessProbe: |
  httpGet:
    path: /health/live
    port: http-internal
  periodSeconds: 10
  timeoutSeconds: 5
