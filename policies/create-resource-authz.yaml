apiVersion: policies.kyverno.io/v1beta1
kind: ValidatingPolicy
metadata:
  name: create-resource-authz
spec:
  evaluation:
    mode: Envoy
  variables:
    - name: mcpReq
      expression: |
        object.attributes.request.http.method == "POST" && object.attributes.request.http.path.startsWith("/mcp") ?
          mcp.Parse(object.attributes.request.http.body) :
          mcp.Parse("{\"jsonrpc\":\"2.0\",\"id\":0,\"method\":\"noop\",\"params\":{}}")
    - name: isCreateResourceCall
      expression: |
        variables.mcpReq.Method == mcp.ToolsCallMethod &&
        variables.mcpReq.ToolCall.Name == "k8s_create_resource"
    - name: yamlContent
      expression: variables.mcpReq.GetStringArgument("yaml_content", "")
    - name: jwks
      expression: jwks.Fetch("http://keycloak-http.keycloak.svc.cluster.local:8080/realms/master/protocol/openid-connect/certs")
    - name: jwtString
      expression: |
        "authorization" in object.attributes.request.http.headers &&
        object.attributes.request.http.headers["authorization"].startsWith("Bearer ") ?
          object.attributes.request.http.headers["authorization"].split(" ")[1] : ""
    - name: decodedJwt
      expression: |
        variables.jwtString == "" ?
          jwt.Decode("eyJhbGciOiJIUzI1NiJ9.e30.invalid", variables.jwks) :
          jwt.Decode(variables.jwtString, variables.jwks)
    - name: manifest
      expression: |
        variables.isCreateResourceCall && variables.yamlContent != "" ?
          json.Unmarshal(variables.yamlContent) :
          dyn({"kind": "", "apiVersion": "v1"})
    - name: namespace
      expression: |
        has(variables.manifest.metadata) && has(variables.manifest.metadata.namespace) ?
          string(variables.manifest.metadata.namespace) : ""
    - name: apiGroup
      expression: |
        variables.manifest["apiVersion"].contains("/") ?
          variables.manifest["apiVersion"].split("/")[0] : ""
    - name: resourceKind
      expression: |
        variables.manifest["kind"] != "" ? variables.manifest["kind"].lowerAscii() + "s" : ""
    - name: sarSpec
      expression: >-
        {
          "kind": dyn("SubjectAccessReview"),
          "apiVersion": dyn("authorization.k8s.io/v1"),
          "spec": dyn({
            "resourceAttributes": dyn({
              "group": variables.apiGroup,
              "resource": variables.resourceKind,
              "namespace": variables.namespace,
              "verb": "create"
            }),
            "user": dyn(variables.decodedJwt.Claims["email"]),
            "groups": dyn(variables.decodedJwt.Claims["groups"])
          })
        }
    - name: sar
      expression: >-
        variables.isCreateResourceCall ?
          resource.Post("authorization.k8s.io/v1", "subjectaccessreviews", variables.sarSpec) :
          dyn({"status": dyn({"allowed": true})})
  matchConditions:
    - name: isToolsCall
      expression: |
        object.attributes.request.http.method == "POST" &&
        object.attributes.request.http.path.startsWith("/mcp") &&
        mcp.Parse(object.attributes.request.http.body).Method == mcp.ToolsCallMethod &&
        mcp.Parse(object.attributes.request.http.body).ToolCall.Name == "k8s_create_resource"
  validations:
    - expression: |
        has(variables.sar.status) && variables.sar.status.allowed == true ?
          envoy.Allowed().Response() : envoy.Denied(403).Response()
